<html>
<head>
    <title>Calender</title>
    <link rel="stylesheet" href="Calender.css">
</head>
<body>
<div class="main">
    <div class="calender">Calender</div>
    <div class="dates">
        <div class="week">
            <div class="weekname" style="color:red">Sunday</div>
            <div class="weekname">Monday</div>
            <div class="weekname">Tuesday</div>
            <div class="weekname">Wednesday</div>
            <div class="weekname">Thursday</div>
            <div class="weekname">Friday</div>
            <div class="weekname" style="color: red">Saturday</div>
        </div>
        <div class="datebody">
            <div class="numbers">
                <div class="dateno"></div>
                <div class="dateno"></div>
                <div class="dateno">1</div>
                <div class="dateno">2</div>
                <div class="dateno">3</div>
                <div class="dateno">4</div>
                <div class="dateno" style="color: red">5</div>
            </div>
            <div class="numbers">
                <div class="dateno" style="color: red">6</div>
                <div class="dateno">7</div>
                <div class="dateno">8</div>
                <div class="dateno">9</div>
                <div class="dateno">10</div>
                <div class="dateno">11</div>
                <div class="dateno" style="color: red">12</div>
            </div>
            <div class="numbers">
                <div class="dateno" style="color: red">13</div>
                <div class="dateno">14</div>
                <div class="dateno">15</div>
                <div class="dateno">16</div>
                <div class="dateno">17</div>
                <div class="dateno">18</div>
                <div class="dateno" style="color: red">19</div>
            </div>
            <div class="numbers">
                <div class="dateno" style="color: red">20</div>
                <div class="dateno">21</div>
                <div class="dateno">22</div>
                <div class="dateno">23</div>
                <div class="dateno">24</div>
                <div class="dateno">25</div>
                <div class="dateno" style="color: red">26</div>
            </div>
            <div class="numbers">
                <div class="dateno" style="color: red">27</div>
                <div class="dateno">28</div>
                <div class="dateno">29</div>
                <div class="dateno">30</div>
                <div class="dateno">31</div>
                <div class="dateno"></div>
                <div class="dateno" style="color: red"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
