name: Commit AI Evaluator & Email Trigger

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  analyze_code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Java Development Kit 21
        uses: actions/setup-java@v4
        with:
          java-version: '21.0.1'
          distribution: 'temurin'

      - name: Locate and Build Candidate Changes via Local Gradle
        run: |
          MODULE_DIR=$(find . -maxdepth 2 -name "build.gradle" ! -path "./build.gradle" -exec dirname {} \;)
          if [ -d "$MODULE_DIR" ]; then
            cd "$MODULE_DIR"
            chmod +x ./gradlew
            ./gradlew compileJava --continue || true
          fi

      - name: Analyze Commit Code Diff via Gemini AI
        id: ai_analyser
        run: |
          set -euo pipefail

          # Get diff only for Java files changed in this commit
          GIT_DIFF=$(git diff HEAD~1 HEAD -- '**.java' || true)

          if [ -z "$GIT_DIFF" ]; then
            echo "No Java source file changes detected in this commit." > AI_REVIEW.txt
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg diff "$GIT_DIFF" \
            '{
              contents: [
                {
                  parts: [
                    {
                      text: (
                        "You are an encouraging but strict Senior Java Developer reviewing a fersher’s daily code changes.\n\n" +
                        "Analyze this Git diff and generate a clean, brief, bulleted report.\n\n" +
                        "Rules:\n" +
                        "1. If code is clean, give brief appreciation.\n" +
                        "2. If issues exist, classify under:\n" +
                        "[CRITICAL LOGIC BUGS]\n" +
                        "[NAMING & STYLE CONVENTIONS]\n" +
                        "[CLEAN CODE SUGGESTIONS]\n\n" +
                        "Keep bullets under 15 words.\n\n" +
                        "Git Diff:\n" + $diff
                      )
                    }
                  ]
                }
              ]
            }')

          echo "===== PAYLOAD DEBUG ====="
          echo "$PAYLOAD" | jq .

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.AI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "===== RAW RESPONSE ====="
          echo "$RESPONSE"

          # Safer extraction: try to get text, then try error message, fallback to raw response if both missing
          AI_TEXT=$(echo "$RESPONSE" | jq -r '
            if .candidates and .candidates[0].content.parts[0].text then
              .candidates[0].content.parts[0].text
            elif .error and .error.message then
              "API ERROR: " + .error.message
            else
              "UNEXPECTED API RESPONSE FORMAT"
            end
          ')

          {
            echo "========================================="
            echo "   NMS BATCH 2026 AI CODE EVALUATION     "
            echo "========================================="
            echo "Candidate Git User: ${{ github.actor }}"
            echo "Commit Message: ${{ github.event.head_commit.message }}"
            echo "Timestamp: $(date)"
            echo "-----------------------------------------"
            echo ""
            echo "$AI_TEXT"
          } > AI_REVIEW.txt
      
      - name: Dispatch Evaluation Email to Trainer and Candidate
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NMS Code Review] Commit Activity by ${{ github.actor }}"
          to: sanjeev@nmsworks.co.in, ${{ github.event.head_commit.author.email }}
          from: "NMS AI-Automated Reviewer"
          body: |
            Hello,

            A new commit push has been evaluated by the automated review system.

            Commiter Account: ${{ github.actor }}
            Branch: ${{ github.ref_name }}

            Please find the detailed code analysis attached as 'AI_REVIEW.txt'.

            You can view the raw code changes here:
            ${{ github.event.head_commit.url }}
          attachments: AI_REVIEW.txt
