name: Commit AI Evaluator & Email Trigger

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  analyze_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Java Development Kit 21
        uses: actions/setup-java@v4
        with:
          java-version: '21.0.1'
          distribution: 'temurin'

      - name: Locate and Build Candidate Changes via Local Gradle
        run: |
          MODULE_DIR=$(find . -maxdepth 2 -name "build.gradle" ! -path "./build.gradle" -exec dirname {} \;)
          if [ -d "$MODULE_DIR" ]; then
            cd "$MODULE_DIR"
            chmod +x ./gradlew
            ./gradlew compileJava --continue || true
          fi

      - name: Analyze Commit Code Diff via Gemini AI
        id: ai_analyser
        run: |
          GIT_DIFF=$(git diff HEAD~1 HEAD -- '**.java' | head -c 4000)
          
          if [ -z "$GIT_DIFF" ]; then
            echo "No Java source file changes detected in this commit." > AI_REVIEW.txt
            exit 0
          fi

          CLEAN_DIFF=$(echo "$GIT_DIFF" | jq -aR .)

          RESPONSE=$(curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{secrets.AI_API_KEY}}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\": [{\"parts\": [{\"text\": \"You are an encouraging but strict Senior Java Developer reviewing a fresher's daily code changes. Analyze this Git diff and generate a clean, brief, bulleted report. Follow these rules: 1. If the code is well-written and has no notable errors, output a brief, highly appreciative and encouraging message praising their clean work. 2. If errors exist, skip the praise and list the critical flaws under these specific headers: [CRITICAL LOGIC BUGS] (resource leaks, broken loops, bad logic), [NAMING & STYLE CONVENTIONS] (violations of camelCase, PascalCase, or bad variable names like x, y, temp), and [CLEAN CODE SUGGESTIONS] (redundant code, better ways to write it). Keep every bullet point under 15 words. Git Diff: $CLEAN_DIFF\"}]}]}")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates.content.parts.text')
          
          # Create a structured text report file
          echo "=========================================" > AI_REVIEW.txt
          echo "   NMS BATCH 2026 AI CODE EVALUATION     " >> AI_REVIEW.txt
          echo "=========================================" >> AI_REVIEW.txt
          echo "Candidate Git User: ${{ github.actor }}" >> AI_REVIEW.txt
          echo "Commit Message: ${{ github.event.head_commit.message }}" >> AI_REVIEW.txt
          echo "Timestamp: $(date)" >> AI_REVIEW.txt
          echo "-----------------------------------------" >> AI_REVIEW.txt
          echo "" >> AI_REVIEW.txt
          echo "$AI_TEXT" >> AI_REVIEW.txt

      - name: Dispatch Evaluation Email to Trainer and Candidate
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NMS Code Review] Commit Activity by ${{ github.actor }}"
          # Sends to your inbox and auto-resolves the candidate's Git email address
          to: sanjeev@nmsworks.co.in, ${{ github.event.head_commit.author.email }} 
          from: "NMS AI-Automated Reviewer"
          body: |
            Hello,

            A new commit push has been evaluated by the automated review system.
            
            Commiter Account: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            
            Please find the detailed code analysis attached as 'AI_REVIEW.txt'.
            
            You can view the raw code changes here:
            ${{ github.event.head_commit.url }}
          attachments: AI_REVIEW.txt
