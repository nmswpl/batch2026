name: Commit AI Evaluator & Email Trigger

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  analyze_code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java Development Kit 21
        uses: actions/setup-java@v4
        with:
          java-version: '21.0.1'
          distribution: 'temurin'

      - name: Locate and Build Candidate Changes via Local Gradle
        run: |
          MODULE_DIR=$(find . -maxdepth 2 -name "build.gradle" ! -path "./build.gradle" -exec dirname {} \;)
          if [ -d "$MODULE_DIR" ]; then
            cd "$MODULE_DIR"
            chmod +x ./gradlew
            ./gradlew compileJava --continue || true
          fi

      - name: Analyze Commit Code Diff via Gemini AI
        id: ai_analyser
        env:
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          set -euo pipefail

          # Fetch git diff and truncate gracefully to prevent overrunning token limits
          GIT_DIFF=$(git diff HEAD~1 HEAD -- '**.java' | head -c 4000 || true)

          if [ -z "$GIT_DIFF" ]; then
            echo "No Java source file changes detected in this commit." > AI_REVIEW.txt
            exit 0
          fi

          # 1. ALWAYS build the payload safely using jq native arguments
          PAYLOAD=$(jq -n \
            --arg diff "$GIT_DIFF" \
            '{
              contents: [
                {
                  parts: [
                    {
                      text: (
                        "You are an encouraging but strict Senior Java Developer reviewing a fresher'\''s daily code changes. " +
                        "Analyze this Git diff and generate a clean, brief, bulleted report. Follow these rules:\n" +
                        "1. If the code is well-written and has no notable errors, output a brief, highly appreciative and encouraging message praising their clean work.\n" +
                        "2. If errors exist, skip the praise and list the critical flaws under these specific headers:\n" +
                        "[CRITICAL LOGIC BUGS] (resource leaks, broken loops, bad logic)\n" +
                        "[NAMING & STYLE CONVENTIONS] (violations of camelCase, PascalCase, or bad variable names like x, y, temp)\n" +
                        "[CLEAN CODE SUGGESTIONS] (redundant code, better ways to write it)\n\n" +
                        "Keep every bullet point under 15 words.\n\n" +
                        "Git Diff:\n" + $diff
                      )
                    }
                  ]
                }
              ]
            }')

          # 2. Execute the request using a clean file payload rather than a broken inline inline string
          echo "$PAYLOAD" > gemini_payload.json

          RESPONSE=$(curl -s -X POST \
            "https://googleapis.com{GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @gemini_payload.json)

          echo "===== RAW RESPONSE DEBUG ====="
          echo "$RESPONSE"

          # 3. Robust verification path to capture errors explicitly instead of printing 'null'
          if echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null 2>&1; then
            AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          elif echo "$RESPONSE" | jq -e '.error.message' > /dev/null 2>&1; then
            AI_TEXT="GEMINI API ERROR: $(echo "$RESPONSE" | jq -r '.error.message')"
          else
            AI_TEXT="UNEXPECTED RESPONSE FROM SERVER. Raw payload data: $RESPONSE"
          fi

          # 4. Generate the final clean text output report
          {
            echo "========================================="
            echo "   NMS BATCH 2026 AI CODE EVALUATION     "
            echo "========================================="
            echo "Candidate Git User: SanjeevNMS"
            echo "Commit Message: ${{ github.event.head_commit.message }}"
            echo "Timestamp: $(TZ="Asia/Kolkata" date '+%a %b %d %H:%M:%S IST %Y')"
            echo "-----------------------------------------"
            echo ""
            echo "$AI_TEXT"
          } > AI_REVIEW.txt
      
      - name: Dispatch Evaluation Email to Trainer and Candidate
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NMS Code Review] Commit Activity by ${{ github.actor }}"
          to: sanjeev@nmsworks.co.in, ${{ github.event.head_commit.author.email }}
          from: "NMS AI-Automated Reviewer"
          body: |
            Hello,

            A new commit push has been evaluated by the automated review system.

            Commiter Account: ${{ github.actor }}
            Branch: ${{ github.ref_name }}

            Please find the detailed code analysis attached as 'AI_REVIEW.txt'.

            You can view the raw code changes here:
            ${{ github.event.head_commit.url }}
          attachments: AI_REVIEW.txt
