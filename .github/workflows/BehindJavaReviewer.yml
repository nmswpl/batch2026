name: BehindJava Reviewer

on:
  repository_dispatch:
    types: [trigger-ai-review] # Only runs when this exact event type is sent

concurrency:
  group: ai-review-global
  cancel-in-progress: false

jobs:
  claim:
    runs-on: ubuntu-latest

    outputs:
      count: ${{ steps.claim.outputs.count }}
      jobs: ${{ steps.claim.outputs.jobs }}

    steps:
      - name: Find AI review queue issue (by label)
        id: find_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "ai-review-queue"
              }
            );

            const queue = issues.find(i => i.title === "AI_REVIEW_QUEUE");

            if (!queue) {
              throw new Error("AI_REVIEW_QUEUE issue not found");
            }

            core.setOutput("issue_number", queue.number);

      - name: Fetch Queue Comments
        id: fetch
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.find_issue.outputs.issue_number }}");

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            core.setOutput("comments", JSON.stringify(comments.data));

      - name: Claim Queue Items
        id: claim
        uses: actions/github-script@v7
        env:
          FETCHED_COMMENTS: ${{ steps.fetch.outputs.comments }}
        with:
          script: |
            const comments = JSON.parse(process.env.FETCHED_COMMENTS);
            core.info(`Total comments fetched from issue: ${comments.length}`);
              
              const unclaimed = [];
              
              // Treat ALL comments as unclaimed (ignore reactions completely)
              for (const c of comments) {
                unclaimed.push(c);
              }
              
              core.info(`Found ${unclaimed.length} unclaimed comments.`);
              
              // Sort by oldest first
              unclaimed.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              
              // Take the top 5
              const selected = unclaimed.slice(0, 5);
              core.info(`Selected ${selected.length} oldest comments to process.`);
              
              if (selected.length === 0) {
                core.info("No items to claim. Setting outputs to zero.");
                core.setOutput("count", 0);
                core.setOutput("jobs", "[]");
              } else {
                const jobs = [];
              
                for (const c of selected) {
                  core.info(`Processing comment #${c.id}...`);
                
                  // NOTE: intentionally disabled "👀 claim reaction" logic
                  // so comments are not marked/filtered via reactions.
                  
                  jobs.push({
                    id: c.id,
                    body: c.body
                  });
                }
            
                core.info(`Successfully prepared ${jobs.length} jobs.`);
                core.setOutput("count", jobs.length);
                core.setOutput("jobs", JSON.stringify(jobs));
              }
  

  analyze_code:
    runs-on: ubuntu-latest
    needs: claim
    if: ${{ needs.claim.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJson(needs.claim.outputs.jobs) }}

    steps:
      - name: Checkout Exact Commit from Queue
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ fromJson(matrix.job.body).branch }}

      - name: Reset to exact commit
        run: |
          git reset --hard ${{ fromJson(matrix.job.body).commit }}

      - name: Prepare AI Input
        run: |
          set -euo pipefail
          
          echo '${{ toJson(matrix.job) }}' > job.json
          
          ADDED_OR_MODIFIED=""
          DELETED=""
          
          BODY='${{ matrix.job.body }}'
        
          # DIRECT JSON parse (NO markdown extraction)
          ADD=$(echo "$BODY" | jq -r '.addedOrModified[]?')
          DEL=$(echo "$BODY" | jq -r '.deleted[]?')
        
          ADDED_OR_MODIFIED+="$ADD"$'\n'
          DELETED+="$DEL"$'\n'
        
          {
            echo "ADDED_OR_MODIFIED<<EOF"
            printf "%s\n" "$ADDED_OR_MODIFIED"
            echo "EOF"
            
            echo "DELETED<<EOF"
            printf "%s\n" "$DELETED"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run AI Review on Changed Java Files
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_MODEL: "gemini-flash-latest"
        run: |
          set -euo pipefail
          LAST_CALL_TIME=0
          
          process_file () {
            FILE=$1
            
            echo "Reviewing $FILE"
          
            if [ ! -f "$FILE" ]; then
              echo "File deleted or missing: $FILE"
              return
            fi
            
            JOB_ID=$(echo '${{ toJson(matrix.job) }}' | jq -r '.id')
            
            FILE_CONTENT=$(cat "$FILE")
          
            PAYLOAD=$(jq -n \
              --arg file "$FILE" \
              --arg content "$FILE_CONTENT" \
              '{
                contents: [
                  {
                    parts: [
                      {
                        text: (
                          "You are an encouraging but strict Senior Java Developer reviewing a fresher'\''s daily code changes. " +
                          "Analyze this Git diff and generate a clean, brief, bulleted report. Follow these rules:\n" +
                          "1. If the code is well-written and has no notable errors, output a brief, highly appreciative and encouraging message praising their clean work.\n" +
                          "2. If errors exist, skip the praise and list the critical flaws under these specific headers:\n" +
                          "[CRITICAL LOGIC BUGS] (resource leaks, broken loops, bad logic)\n" +
                          "[NAMING & STYLE CONVENTIONS] (violations of camelCase, PascalCase, or bad variable names like x, y, temp)\n" +
                          "[CLEAN CODE SUGGESTIONS] (redundant code, better ways to write it)\n\n" +
                          "Return ONLY raw JSON. Do NOT use markdown. Do NOT wrap output in triple backticks. Do NOT add explanations. Output must start with { and end with }. Any extra text makes it invalid.\n\n" +
                          "JSON FORMAT:\n" +
                          "{\n" +
                          "  \"status\": \"PASS|FAIL\",\n" +
                          "  \"files\": [\n" +
                          "    {\n" +
                          "      \"file\": \"FileName.java\",\n" +
                          "      \"criticalLogicBugs\": [],\n" +
                          "      \"namingStyleIssues\": [],\n" +
                          "      \"cleanCodeSuggestions\": []\n" +
                          "    }\n" +
                          "  ]\n" +
                          "}\n\n" +
                          "- If no issues: status = PASS, files = []\n" +
                          "- Keep each point under 15 words\n\n" +
                          "FILE:\n" + $content
                        )
                      }
                    ]
                  }
                ]
              }')
          
            # =========================
            # GEMINI RATE LIMITER
            # =========================
            : "${LAST_CALL_TIME:=0}"
            
            MIN_INTERVAL=5   # 6 seconds = ~10 calls/min max (safe for 10–15 RPM limit)
            
            CURRENT_TIME=$(date +%s)
            DIFF=$((CURRENT_TIME - LAST_CALL_TIME))
            
            if [ "$DIFF" -lt "$MIN_INTERVAL" ]; then
            sleep $((MIN_INTERVAL - DIFF))
            fi
            
            LAST_CALL_TIME=$(date +%s)
            
            MODELS=(
              "gemini-flash-latest"
              "gemini-2.5-flash"
              "gemini-2.5-pro"
            )
            
            RESPONSE=""
            
            for MODEL in "${MODELS[@]}"; do
              echo "Trying model: $MODEL"
              SUCCESS=false
              
              for ATTEMPT in 1 2; do
                echo "Attempt $ATTEMPT"
                RESPONSE=$(curl -s -X POST \
                  "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "$PAYLOAD")
                
                # success if candidate exists
                if echo "$RESPONSE" | jq -e '.candidates[0]' >/dev/null 2>&1; then
                  SUCCESS=true
                  break
                fi
                
                echo "API failed. Retrying..."
                sleep 5
          
              done
          
              if [ "$SUCCESS" = true ]; then
                break
              fi
          
              echo "Switching to next model..."
            done
            
            if [ "$SUCCESS" != true ]; then
              echo "All Gemini models failed"
              exit 1
            fi
          
            FILE_OUT="ai_${JOB_ID}_${FILE//\//_}.json"
            echo "$RESPONSE" | tee "$FILE_OUT"
          
            echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' \
              > "ai_${JOB_ID}_${FILE//\//_}.txt" || true
          }
          
          # Process added/modified files
          for file in $ADDED_OR_MODIFIED; do
            process_file "$file"
          done

      - name: Fetch Commit Metadata
        id: commit_meta
        uses: actions/github-script@v7
        with:
          script: |
            const job = ${{ toJson(matrix.job) }};
            const body = JSON.parse(job.body);

            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: body.commit
            });

            core.setOutput("author", commit.data.commit.author.name);
            core.setOutput("email", commit.data.commit.author.email);
            core.setOutput("message", commit.data.commit.message);

      - name: Manage GitHub Issues
        id: manage_issues
        uses: actions/github-script@v7
        env:
          JOB: ${{ toJson(matrix.job) }}
        with:
          script: |
            try {
              const fs = require('fs');
  
              const job = JSON.parse(process.env.JOB);
              const body = JSON.parse(job.body);
              
              const commitData = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: body.commit
              });
              
              const branch = body.branch;
              
              const changed = body.addedOrModified || [];
              const deletedFiles = body.deleted || [];
  
              let aiData = {};
              const files = fs.readdirSync('.');
  
              for (const f of files) {
                if (f.startsWith('ai_') && f.endsWith('.json')) {
                  try {
                    const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                    const fileName = f
                      .replace(/^ai_\d+_/, '')
                      .replace(/\.json$/, '');
                    
                    aiData[fileName] = data;
                  } catch (e) {
                    console.log(`Failed parsing ${f}`);
                  }
                }
              }
  
              const issues = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page: 100
                }
              );
                
              const commentId = job.id;
  
              const findIssue = (file) =>
                issues.find(i =>
                i.title === `AI Review - ${branch} - ${file}`
              );
  
              // Close issues for deleted files
              for (const file of deletedFiles) {
                const existing = findIssue(file);
  
                if (existing) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: "closed"
                  });
                }
              }
  
              for (const file of changed) {
  
                const cleanFile = file.trim();
  
                const normalizedKey = Object.keys(aiData).find(k => {
                const base = k.replace(/^ai_\d+_/, '').replace(/\.json$/, '');
                  return base.replace(/_/g, '/') === cleanFile;
                });
                
                const aiFile = normalizedKey ? aiData[normalizedKey] : null;
  
                if (!aiFile) continue;
  
                let raw = aiFile.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                // remove markdown fences if present
                raw = raw
                  .replace(/```json/g, "")
                  .replace(/```/g, "")
                  .trim();
  
                let parsed;
                try {
                  parsed = JSON.parse(raw);
                } catch (e) {
                  console.log("JSON parse failed", cleanFile);
                  parsed = {
                    status: "FAIL",
                    files: []
                  };
                }
  
                const isPass = parsed.status === "PASS";
                const issueTitle = `AI Review - ${branch} - ${cleanFile}`;
                
                const author = `${{ steps.commit_meta.outputs.author }}`;
                const studentLabel = `student:${author.toLowerCase()}`;
                const statusLabel = isPass ? "status:pass" : "status:fail";
                const labels = [studentLabel, statusLabel];
  
                const author = `${{ steps.commit_meta.outputs.author }}`;
                const email = `${{ steps.commit_meta.outputs.email }}`;
                const message = `${{ steps.commit_meta.outputs.message }}`;
                
                let formatted =
                `GitHub Username: ${author}
              Commit Author: ${author}
              Commit Email: ${email}
              Commit Message: ${message}
              Timestamp:
                ${new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" })}
                `;
        
                for (const f of parsed.files || []) {
                  if (f.criticalLogicBugs?.length) {
                    formatted += `[CRITICAL LOGIC BUGS]\n\n`;
                    f.criticalLogicBugs.forEach(i => formatted += `    ${i}\n`);
                    formatted += `\n`;
                  }
  
                  if (f.namingStyleIssues?.length) {
                    formatted += `[NAMING & STYLE CONVENTIONS]\n\n`;
                    f.namingStyleIssues.forEach(i => formatted += `    ${i}\n`);
                    formatted += `\n`;
                  }
  
                  if (f.cleanCodeSuggestions?.length) {
                    formatted += `[CLEAN CODE SUGGESTIONS]\n\n`;
                    f.cleanCodeSuggestions.forEach(i => formatted += `    ${i}\n`);
                    formatted += `\n`;
                  }
                }
  
                const existing = findIssue(cleanFile);
                
                // =========================
                // FIRST TIME FAIL → CREATE ISSUE
                // =========================
                if (!existing) {
                
                  if (isPass) continue; // no issue needed for PASS
                
                  const issue = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: formatted, // FIRST FAIL ONLY
                    labels: labels,
                    assignees: author ? [author] : []
                  });
      
                  continue;
                }
      
                // =========================
                // EXISTING ISSUE PATH
                // =========================
                
                // update labels only
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  labels: labels
                });
                
                if (isPass) {
                  // final comment before close
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    body: "Final status: PASS. Closing issue."
                  });
                
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: "closed"
                  });
                
                  continue;
                }
            
                // =========================
                // SUBSEQUENT FAIL → COMMENT ONLY
                // =========================
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: formatted
                });
              }
              
              core.setOutput("status", "SUCCESS");
            } catch (e) {
              core.setOutput("status", "FAIL");
              throw e;
            }

      - name: Delete Processed Queue Items
        if: ${{ steps.manage_issues.outputs.status == 'SUCCESS' }}
        uses: actions/github-script@v7
        env:
          JOB: ${{ toJson(matrix.job) }}
        with:
          script: |
            const job = JSON.parse(process.env.JOB);

            // extra safety: ensure comment still exists
            try {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: job.id
              });
            } catch (e) {
              console.log("Comment already deleted or inaccessible:", job.id);
            }

      - name: Build Email Body
        run: |
          set -euo pipefail
          
          echo '${{ toJson(matrix.job) }}' > job.json

          BODY='${{ matrix.job.body }}'
          BRANCH=$(echo "$BODY" | jq -r '.branch')
          COMMIT=$(echo "$BODY" | jq -r '.commit')
          
          EMAIL=$(cat <<EOF
          Hello,
          
          A new commit push has been evaluated by the automated review system.
          
          Committer Account: ${{ steps.commit_meta.outputs.author }}
          Branch: $BRANCH
          
          Please find the detailed code analysis attached as 'AI_REVIEW.txt'.
        
          You can view the raw code changes here:
            https://github.com/${{ github.repository }}/commit/$COMMIT
          
          EOF
          )
          
          {
            echo "EMAIL<<EOF"
            echo "$EMAIL"
            echo "EOF"
          } >> "$GITHUB_ENV"  

      - name: Generate AI Review Report
        run: |
          set -euo pipefail
          JOB_ID=$(echo '${{ toJson(matrix.job) }}' | jq -r '.id')
          
          {
            echo "========================================="
            echo "   NMS BATCH 2026 AI CODE EVALUATION"
            echo "========================================="
            echo ""
            echo "GitHub Username: ${{ steps.commit_meta.outputs.author }}"
            echo "Commit Author: ${{ steps.commit_meta.outputs.author }}"
            echo "Commit Email: ${{ steps.commit_meta.outputs.email }}"
            echo "Commit Message: ${{ steps.commit_meta.outputs.message }}"
            echo "Timestamp: $(TZ=Asia/Kolkata date)""
            echo ""
          } > AI_REVIEW.txt
          
          PASS_COUNT=0
          FAIL_COUNT=0
          TOTAL_COUNT=0
          
          shopt -s nullglob
          files=(ai_${JOB_ID}_*.json)
          
          if [ -z "${ADDED_OR_MODIFIED:-}" ]; then
            echo "No Java files were modified in this commit." >> AI_REVIEW.txt
            exit 0
          fi
          
          if [ ${#files[@]} -eq 0 ]; then
            echo "No AI analysis was generated." >> AI_REVIEW.txt
            exit 0
          fi
          
          PASS_SECTION=""
          FAIL_SECTION=""
      
          format_block() {
            local file="$1"
            local status="$2"
            local critical="$3"
            local style="$4"
            local clean="$5"
      
            {
              echo ""
              echo "File: ${file}"
              echo ""
              echo "Status: ${status}"
              echo ""
      
              if [ -n "${critical}" ]; then
                echo "[CRITICAL LOGIC BUGS]"
                echo "${critical}"
                echo ""
              fi
      
              if [ -n "${style}" ]; then
                echo "[NAMING & STYLE CONVENTIONS]"
                echo "${style}"
                echo ""
              fi
      
              if [ -n "${clean}" ]; then
                echo "[CLEAN CODE SUGGESTIONS]"
                echo "${clean}"
                echo ""
              fi
      
              echo "-----------------------------------------"
              echo ""
            }
          }
      
          for f in "${files[@]}"; do
        
            TOTAL_COUNT=$((TOTAL_COUNT + 1))
          
            RAW=$(jq -r '.candidates[0].content.parts[0].text // "{}"' "$f")
            
            PARSED=$(echo "$RAW" | jq -r '.')
            STATUS=$(echo "$PARSED" | jq -r '.status')
            AI_MESSAGE=$(echo "$PARSED" | jq -r '.message // ""')
          
            FILE_NAME=$(basename "$f" .json)
            FILE_NAME=${FILE_NAME#ai_}
            FILE_NAME=$(basename "$FILE_NAME")
          
            STATUS=$(echo "$RAW" | jq -r '.status' 2>/dev/null || echo "FAIL")
          
            if [ "$STATUS" = "PASS" ]; then
              PASS_COUNT=$((PASS_COUNT + 1))

              PASS_SECTION="${PASS_SECTION}
              File: ${FILE_NAME}
        
              Status: PASS
              
              ${AI_MESSAGE}
        
              -----------------------------------------
        
              "
              continue
            fi
          
            FAIL_COUNT=$((FAIL_COUNT + 1))
      
            FILE_BLOCK=""
      
            while IFS= read -r FILE_JSON; do
        
              CRITICAL=$(echo "$FILE_JSON" | jq -r '
                (.criticalLogicBugs // [])
                | map("- " + .)
                | join("\n")
              ')
              
              STYLE=$(echo "$FILE_JSON" | jq -r '
                (.namingStyleIssues // [])
                | map("- " + .)
                | join("\n")
              ')
              
              CLEAN=$(echo "$FILE_JSON" | jq -r '
                (.cleanCodeSuggestions // [])
                | map("- " + .)
                | join("\n")
              ')
      
              FILE_BLOCK+=$(format_block "$FILE_NAME" "FAIL" "$CRITICAL" "$STYLE" "$CLEAN")
      
            done < <(
              echo "$RAW" | jq -c '.files[]?' 2>/dev/null || true
            )
      
            FAIL_SECTION="${FAIL_SECTION}${FILE_BLOCK}"
          
          done
      
          {
            if [ "$PASS_COUNT" -gt 0 ]; then
              echo "-----------------------------------------"
              echo "FILES PASSED"
              echo "-----------------------------------------"
              echo ""
              printf "%b" "$PASS_SECTION"
            fi
      
            if [ "$FAIL_COUNT" -gt 0 ]; then
              echo "-----------------------------------------"
              echo "FILES WITH ISSUES"
              echo "-----------------------------------------"
              echo ""
              printf "%b" "$FAIL_SECTION"
            fi
      
            echo ""
            echo "SUMMARY"
            echo "-----------------------------------------"
            echo "Files Reviewed : $TOTAL_COUNT"
            echo "Files Passed   : $PASS_COUNT"
            echo "Files Failed   : $FAIL_COUNT"
          } >> AI_REVIEW.txt


      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NMS AI Code Review] Commit Activity by ${{ steps.commit_meta.outputs.author }}"
          to: ${{ steps.commit_meta.outputs.email }}
          cc: sanjeev@nmsworks.co.in
          from: "NMS AI-Automated Reviewer"
          body: ${{ env.EMAIL }}
          attachments: AI_REVIEW.txt
