name: BehindJava Reviewer

on:
  repository_dispatch:
    types: [trigger-ai-review] # Only runs when this exact event type is sent

concurrency:
  group: ai-review-global
  cancel-in-progress: false

jobs:
  claim:
    runs-on: ubuntu-latest

    outputs:
      count: ${{ steps.claim.outputs.count }}
      jobs: ${{ steps.claim.outputs.jobs }}

    steps:
      - name: Find AI review queue issue (by label)
        id: find_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "ai-review-queue"
              }
            );

            const queue = issues.find(i => i.title === "AI_REVIEW_QUEUE");

            if (!queue) {
              throw new Error("AI_REVIEW_QUEUE issue not found");
            }

            core.setOutput("issue_number", queue.number);

      - name: Fetch Queue Comments
        id: fetch
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.find_issue.outputs.issue_number }}");

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 10, // small batch window
              page: 1
            });

            core.setOutput("comments", JSON.stringify(comments.data));

      - name: Claim Queue Items
        id: claim
        uses: actions/github-script@v7
        env:
          FETCHED_COMMENTS: ${{ steps.fetch.outputs.comments }}
        with:
          script: |
            const comments = JSON.parse(process.env.FETCHED_COMMENTS);
            core.info(`Total comments fetched from issue: ${comments.length}`);

            const unclaimed = [];

            for (const c of comments) {
              const reactions = c.reactions || {};
              const hasEyes = reactions.eyes > 0;
            
              // if (hasEyes) {
              //   core.info(`Skipping comment #${c.id}: Already has 👀 reaction.`);
              // } else {
              //   unclaimed.push(c);
              // }
              unclaimed.push(c);
            }

            core.info(`Found ${unclaimed.length} unclaimed comments.`);

            // Sort by oldest first
            unclaimed.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            // Take the top 5
            const selected = unclaimed.slice(0, 5);
            core.info(`Selected ${selected.length} oldest comments to process.`);

            if (selected.length === 0) {
              core.info("No items to claim. Setting outputs to zero.");
              core.setOutput("count", 0);
              core.setOutput("jobs", "[]");
            } else {
              const jobs = [];

              for (const c of selected) {
                core.info(`Claiming comment #${c.id}...`);
            
                // await github.rest.reactions.createForIssueComment({
                //  owner: context.repo.owner,
                //  repo: context.repo.repo,
                //  comment_id: c.id,
                //  content: "eyes"
                // });

                let parsed;
                try {
                  parsed = JSON.parse(c.body);
                } catch (e) {
                  core.info(`Skipping invalid JSON comment: ${c.id}`);
                  continue;
                }
                  
                jobs.push({
                  id: c.id,
                  body: JSON.stringify(parsed)
                });
              }

              core.info(`Successfully claimed ${jobs.length} jobs.`);
              core.setOutput("count", jobs.length);
              core.setOutput("jobs", JSON.stringify(jobs));
            }
  

  analyze_code:
    runs-on: ubuntu-latest
    needs: claim
    if: ${{ needs.claim.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJson(needs.claim.outputs.jobs) }}

    steps:
      - name: Checkout Exact Commit from Queue
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ fromJson(matrix.job.body).branch }}

      - name: Reset to exact commit
        run: |
          git reset --hard ${{ fromJson(matrix.job.body).commit }}

      - name: Prepare AI Input
        run: |
          set -euo pipefail
          
          echo '${{ toJson(matrix.job) }}' > job.json
          
          ADDED_OR_MODIFIED=""
          DELETED=""
          
          BODY='${{ matrix.job.body }}'
        
          # DIRECT JSON parse (NO markdown extraction)
          ADD=$(echo "$BODY" | jq -r '.addedOrModified[]?')
          DEL=$(echo "$BODY" | jq -r '.deleted[]?')
        
          ADDED_OR_MODIFIED+="$ADD"$'\n'
          DELETED+="$DEL"$'\n'
        
          {
            echo "ADDED_OR_MODIFIED<<EOF"
            printf "%s\n" "$ADDED_OR_MODIFIED"
            echo "EOF"
            
            echo "DELETED<<EOF"
            printf "%s\n" "$DELETED"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run AI Review on Changed Java Files
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_MODEL: "gemini-flash-latest"
        run: |
          set -euo pipefail
  
          LAST_CALL_TIME=0
          JOB_ID=$(echo '${{ toJson(matrix.job) }}' | jq -r '.id')
          
          BATCH_SIZE=5
          FILES=($ADDED_OR_MODIFIED)
          
          process_batch() 
          {
            local ALL_FILES_CONTENT=""
          
            for file in "$@"; do
              if [ ! -f "$file" ]; then
                echo "File deleted or missing: $file"
                continue
              fi
            
              echo "Adding $file to review batch"
            
              ALL_FILES_CONTENT="${ALL_FILES_CONTENT}
          FILE: ${file}
          $(cat "$file")
            
          ========================================
          "
            done
          
            PAYLOAD=$(jq -n \
              --arg content "$ALL_FILES_CONTENT" \
            '{
              contents: [
                {
                  parts: [
                    {
                      text: (
                              "You are an encouraging but strict Senior Java Developer reviewing a fresher'\''s daily code changes. " +
                              "Analyze all Java files below and generate a clean, brief, bulleted report.\n\n" +
              
                              "Rules:\n" +
                              "1. If a file is well-written and has no notable issues, mark status PASS and give a brief, highly appreciative and encouraging message praising their clean work.\n" +
                              "2. If issues exist, mark status FAIL.\n" +
                                "[CRITICAL LOGIC BUGS] (resource leaks, broken loops, bad logic)\n" +
                                "[NAMING & STYLE CONVENTIONS] (violations of camelCase, PascalCase, or bad variable names like x, y, temp)\n" +
                                "[CLEAN CODE SUGGESTIONS] (redundant code, better ways to write it)\n\n" +
                              "3. Review each file independently.\n\n" +
              
                              "Return ONLY raw JSON. No markdown. No explanations. Output must start with { and end with }.\n\n" +
              
                              "JSON FORMAT:\n" +
                              "{\n" +
                              "  \"files\": [\n" +
                              "    {\n" +
                              "      \"file\": \"FULL_FILE_PATH\",\n" +
                              "      \"status\": \"PASS|FAIL\",\n" +
                              "      \"message\": \"Appreciation Message when status is PASS\",\n" +
                              "      \"criticalLogicBugs\": [],\n" +
                              "      \"namingStyleIssues\": [],\n" +
                              "      \"cleanCodeSuggestions\": []\n" +
                              "    }\n" +
                              "  ]\n" +
                              "}\n\n" +
              
                              "- One object per file\n" +
                              "- Keep each point under 20 words in simple english\n" +
                              "- Use empty arrays when no issues exist\n\n" +
              
                              "FILES:\n" + ($content // "")
                            )
                    }
                  ]
                }
              ]
            }')
          
            # =========================
            # GEMINI RATE LIMITER
            # =========================
            : "${LAST_CALL_TIME:=0}"
          
            MIN_INTERVAL=12      # 6 seconds = ~10 calls/min max (safe for 10–15 RPM limit)
          
            CURRENT_TIME=$(date +%s)
            DIFF=$((CURRENT_TIME - LAST_CALL_TIME))
          
            if [ "$DIFF" -lt "$MIN_INTERVAL" ]; then
              sleep $((MIN_INTERVAL - DIFF))
            fi
          
            LAST_CALL_TIME=$(date +%s)
          
            MODELS=(
              "gemini-3.1-flash-lite"
              "gemini-flash-latest"
              "gemini-2.5-flash"
              "gemini-2.5-pro"
            )
          
            RESPONSE=""
          
            for MODEL in "${MODELS[@]}"; do
              echo "Trying model: $MODEL"
              SUCCESS=false
              
              for ATTEMPT in 1 2 3; do
                
                echo "================ CURL DEBUG ================"
                echo "curl -X POST \"https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=\$GEMINI_API_KEY\" \
                -H \"Content-Type: application/json\" \
                -d '$PAYLOAD'"
                echo "============================================"
                
                echo "Attempt $ATTEMPT"
                RESPONSE=$(curl -s -X POST \
                  "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "$PAYLOAD")
                
                echo "================ RAW RESPONSE ================"
                echo "$RESPONSE"
                echo "============================================"
                
                # success if candidate exists
                if echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' >/dev/null 2>&1; then
                  SUCCESS=true
                  break
                fi
                
                ERROR_MESSAGE=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error"' 2>/dev/null)
                ERROR_CODE=$(echo "$RESPONSE" | jq -r '.error.code // "N/A"' 2>/dev/null)
                ERROR_STATUS=$(echo "$RESPONSE" | jq -r '.error.status // "N/A"' 2>/dev/null)
                
                echo "API failed (Attempt $ATTEMPT)"
                echo "Code   : $ERROR_CODE"
                echo "Status : $ERROR_STATUS"
                echo "Reason : $ERROR_MESSAGE"
                
                if [ "$ATTEMPT" -lt 3 ]; then
                  echo "Retrying in 20 seconds..."
                  sleep 20
                fi
          
              done
          
              if [ "$SUCCESS" = true ]; then
                break
              fi
          
              echo "Switching to next model..."
            done
            
            if [ "$SUCCESS" != true ]; then
              echo "All Gemini models failed"
              exit 1
            fi
          
            REVIEW_JSON=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
            echo "$REVIEW_JSON" > "ai_${JOB_ID}_batch_review.json"
          
            jq -c '.files[]' "ai_${JOB_ID}_batch_review.json" | while read -r FILE_JSON; do
              FILE_NAME=$(echo "$FILE_JSON" | jq -r '.file')
              FILE_STATUS=$(echo "$FILE_JSON" | jq -r '.status')
            
              SAFE_FILE_NAME="${FILE_NAME//\//_}"
            
              jq -n \
                --arg status "$FILE_STATUS" \
                --argjson fileObj "$FILE_JSON" \
                '{
                    status: $status,
                    files: [
                      ($fileObj | del(.status))
                    ]
                  }' \
                > "ai_${JOB_ID}_${SAFE_FILE_NAME}.json"
            
              jq -n \
                --arg status "$FILE_STATUS" \
                --argjson fileObj "$FILE_JSON" \
                '{
                    status: $status,
                    files: [
                      ($fileObj | del(.status))
                    ]
                  }' \
                > "ai_${JOB_ID}_${SAFE_FILE_NAME}.txt"
            done
          }
          
          for ((i=0; i<${#FILES[@]}; i+=BATCH_SIZE)); do
            BATCH=("${FILES[@]:i:BATCH_SIZE}")
            process_batch "${BATCH[@]}"
          done

      - name: Manage GitHub Issues
        id: manage_issues
        uses: actions/github-script@v7
        env:
          JOB: ${{ toJson(matrix.job) }}
        with:
          script: |
            try {
              const fs = require('fs');
  
              const job = JSON.parse(process.env.JOB);
              const body = JSON.parse(job.body);
              
              const branch = body.branch;
              
              const changed = body.addedOrModified || [];
              const deletedFiles = body.deleted || [];
  
              let aiData = {};
              const files = fs.readdirSync('.');
            
              console.log("===== FILES IN WORKING DIRECTORY =====");
              console.log(files);
              console.log("======================================");
  
              for (const f of files) {
                if (f.startsWith('ai_') && f.endsWith('.json')) {
                  console.log("RAW AI FILE:", f);
                  try {
                    const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                    const fileName = f
                      .replace(/^ai_\d+_/, '')
                      .replace(/\.json$/, '');
                    
                    console.log("DERIVED AI KEY:", fileName);
                    aiData[fileName] = data;
                  } catch (e) {
                    console.log(`Failed parsing ${f}`);
                  }
                }
              }
  
              const issues = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page: 100
                }
              );
                
              const commentId = job.id;
  
              const findIssue = (file) =>
                issues.find(i =>
                i.title === `AI Review - ${branch} - ${file}`
              );
  
              // Close issues for deleted files
              for (const file of deletedFiles) {
                const existing = findIssue(file);
  
                if (existing) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: "closed"
                  });
                }
              }
  
              for (const file of changed) {
  
                const cleanFile = file.trim();
  
                const normalizedKey = Object.keys(aiData).find(k => {
                const base = k.replace(/^ai_\d+_/, '').replace(/\.json$/, '');
                  return base.replace(/_/g, '/') === cleanFile;
                });
                
                console.log("NORMALIZED KEY (normalized):", normalizedKey);
                console.log("aiFile :", aiData[normalizedKey]);
                
                const aiFile = normalizedKey ? aiData[normalizedKey] : null;
  
                if (!aiFile) {
                  console.log("aiData keys:", Object.keys(aiData));
                  console.log("normalizedKey:", normalizedKey);
                  continue;
                }
  
                let parsed = aiFile;
                console.log("************** aiFile **************");
                console.log(parsed);
                console.log("************** aiFile **************");
  
                const isPass = parsed.status === "PASS";
                const issueTitle = `AI Review - ${branch} - ${cleanFile}`;
                
                const userName = body.githubUsername || "";
                const author = body.commitAuthor || "";
                const studentLabel = `student:${author.toLowerCase()}`;
                const statusLabel = isPass ? "status:pass" : "status:fail";
                const labels = [studentLabel, statusLabel];
  
                const email = body.commitEmail || "";
                const message = body.commitMessage || "";
                const commitTime = body.commitTimeIST || "";
                
                let formatted =
                `GitHub Username: ${userName}
              Commit Author: ${author}
              Commit Email: ${email}
              Commit Message: ${message}
              Timestamp: ${commitTime}
            
                `;
        
                for (const f of parsed.files || []) {
                  if (f.criticalLogicBugs?.length) {
                    formatted += `[CRITICAL LOGIC BUGS]\n\n`;
                    f.criticalLogicBugs.forEach(i => formatted += `    ${i}\n`);
                    formatted += `\n`;
                  }
  
                  if (f.namingStyleIssues?.length) {
                    formatted += `[NAMING & STYLE CONVENTIONS]\n\n`;
                    f.namingStyleIssues.forEach(i => formatted += `    ${i}\n`);
                    formatted += `\n`;
                  }
  
                  if (f.cleanCodeSuggestions?.length) {
                    formatted += `[CLEAN CODE SUGGESTIONS]\n\n`;
                    f.cleanCodeSuggestions.forEach(i => formatted += `    ${i}\n`);
                    formatted += `\n`;
                  }
                }
  
                const existing = findIssue(cleanFile);
                
                // =========================
                // FIRST TIME FAIL → CREATE ISSUE
                // =========================
                if (!existing) {
                
                  if (isPass) continue; // no issue needed for PASS
                
                  const issue = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: formatted, // FIRST FAIL ONLY
                    labels: labels,
                    assignees: [userName]
                  });
      
                  continue;
                }
      
                // =========================
                // EXISTING ISSUE PATH
                // =========================
                
                // update labels only
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  labels: labels
                });
                
                if (isPass) {
                  // final comment before close
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    body: "Final status: PASS. Closing issue."
                  });
                
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: "closed"
                  });
                
                  continue;
                }
            
                // =========================
                // SUBSEQUENT FAIL → COMMENT ONLY
                // =========================
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: formatted
                });
              }
              
              core.setOutput("status", "SUCCESS");
            } catch (e) {
              core.setOutput("status", "FAIL");
              throw e;
            }

      - name: Build Email Body
        run: |
          set -euo pipefail
          
          echo '${{ toJson(matrix.job) }}' > job.json

          BODY='${{ matrix.job.body }}'
          BRANCH=$(echo "$BODY" | jq -r '.branch')
          COMMIT=$(echo "$BODY" | jq -r '.commit')
          
          EMAIL=$(cat <<EOF
          Hello,
          
          A new commit push has been evaluated by the automated review system.
          
          Committer Account: $(echo "$BODY" | jq -r '.githubUsername')
          Branch: $BRANCH
          
          Please find the detailed code analysis attached as 'AI_REVIEW.txt'.
        
          You can view the raw code changes here:
            https://github.com/${{ github.repository }}/commit/$COMMIT
          
          EOF
          )
          
          {
            echo "EMAIL<<EOF"
            echo "$EMAIL"
            echo "EOF"
          } >> "$GITHUB_ENV"  

      - name: Generate AI Review Report
        run: |
          set -euo pipefail
          JOB_ID=$(echo '${{ toJson(matrix.job) }}' | jq -r '.id')
          BODY='${{ matrix.job.body }}'
          
          {
            echo "========================================="
            echo "   NMS BATCH 2026 AI CODE EVALUATION"
            echo "========================================="
            echo ""
            echo "GitHub Username: $(echo "$BODY" | jq -r '.githubUsername')"
            echo "Commit Author: $(echo "$BODY" | jq -r '.commitAuthor // .githubUsername')"
            echo "Commit Email: $(echo "$BODY" | jq -r '.commitEmail')"
            echo "Commit Message: $(echo "$BODY" | jq -r '.commitMessage')"
            echo "Timestamp: $(TZ=Asia/Kolkata date)"
            echo ""
          } > AI_REVIEW.txt
          
          PASS_COUNT=0
          FAIL_COUNT=0
          TOTAL_COUNT=0
          
          shopt -s nullglob
          files=(ai_${JOB_ID}_*.json)
          
          if [ -z "${ADDED_OR_MODIFIED:-}" ]; then
            echo "No Java files were modified in this commit." >> AI_REVIEW.txt
            exit 0
          fi
          
          if [ ${#files[@]} -eq 0 ]; then
            echo "No AI analysis was generated." >> AI_REVIEW.txt
            exit 0
          fi
          
          PASS_SECTION=""
          FAIL_SECTION=""
      
          format_block() {
            local file="$1"
            local status="$2"
            local critical="$3"
            local style="$4"
            local clean="$5"
      
            {
              echo ""
              echo "File: ${file}"
              echo ""
              echo "Status: ${status}"
              echo ""
      
              if [ -n "${critical}" ]; then
                echo "[CRITICAL LOGIC BUGS]"
                echo "${critical}"
                echo ""
              fi
      
              if [ -n "${style}" ]; then
                echo "[NAMING & STYLE CONVENTIONS]"
                echo "${style}"
                echo ""
              fi
      
              if [ -n "${clean}" ]; then
                echo "[CLEAN CODE SUGGESTIONS]"
                echo "${clean}"
                echo ""
              fi
      
              echo "-----------------------------------------"
              echo ""
            }
          }
      
          for f in "${files[@]}"; do
        
            TOTAL_COUNT=$((TOTAL_COUNT + 1))
          
            RAW=$(cat "$f")
            
            STATUS=$(echo "$RAW" | jq -r '.status')
            AI_MESSAGE=$(echo "$RAW" | jq -r '.files[]?.message // empty')
          
            FILE_NAME=$(basename "$f" .json)
            FILE_NAME=${FILE_NAME#ai_}
            FILE_NAME=$(basename "$FILE_NAME")
          
            STATUS=$(echo "$RAW" | jq -r '.status' 2>/dev/null || echo "FAIL")
          
            if [ "$STATUS" = "PASS" ]; then
              PASS_COUNT=$((PASS_COUNT + 1))

              PASS_SECTION="${PASS_SECTION}
              File: ${FILE_NAME}
        
              Status: PASS
              
              ${AI_MESSAGE}
        
              -----------------------------------------
        
              "
              continue
            fi
          
            FAIL_COUNT=$((FAIL_COUNT + 1))
      
            FILE_BLOCK=""
      
            while IFS= read -r FILE_JSON; do
        
              CRITICAL=$(echo "$FILE_JSON" | jq -r '
                (.criticalLogicBugs // [])
                | map("- " + .)
                | join("\n")
              ')
              
              STYLE=$(echo "$FILE_JSON" | jq -r '
                (.namingStyleIssues // [])
                | map("- " + .)
                | join("\n")
              ')
              
              CLEAN=$(echo "$FILE_JSON" | jq -r '
                (.cleanCodeSuggestions // [])
                | map("- " + .)
                | join("\n")
              ')
      
              FILE_BLOCK+=$(format_block "$FILE_NAME" "FAIL" "$CRITICAL" "$STYLE" "$CLEAN")
      
            done < <(
              echo "$RAW" | jq -c '.files[]?' 2>/dev/null || true
            )
      
            FAIL_SECTION="${FAIL_SECTION}${FILE_BLOCK}"
          
          done
      
          {
            if [ "$PASS_COUNT" -gt 0 ]; then
              echo "-----------------------------------------"
              echo "FILES PASSED"
              echo "-----------------------------------------"
              echo ""
              printf "%b" "$PASS_SECTION"
            fi
      
            if [ "$FAIL_COUNT" -gt 0 ]; then
              echo "-----------------------------------------"
              echo "FILES WITH ISSUES"
              echo "-----------------------------------------"
              echo ""
              printf "%b" "$FAIL_SECTION"
            fi
      
            echo ""
            echo "SUMMARY"
            echo "-----------------------------------------"
            echo "Files Reviewed : $TOTAL_COUNT"
            echo "Files Passed   : $PASS_COUNT"
            echo "Files Failed   : $FAIL_COUNT"
          } >> AI_REVIEW.txt


      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NMS AI Code Review] Commit Activity by ${{ fromJson(matrix.job.body).githubUsername }}"
          to: ${{ fromJson(matrix.job.body).commitEmail }}
          cc: sanjeev@nmsworks.co.in
          from: "NMS AI-Automated Reviewer"
          body: ${{ env.EMAIL }}
          attachments: AI_REVIEW.txt
