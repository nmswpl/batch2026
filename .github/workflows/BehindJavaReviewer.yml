name: BehindJava Reviewer

on:
  push:
    branches:
      - '**'
      - '!main'

concurrency:
  group: student-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  analyze_code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java Development Kit 21
        uses: actions/setup-java@v4
        with:
          java-version: '21.0.1'
          distribution: 'temurin'

      - name: Detect Changed Java Files (This Push Only)
        id: changes
        run: |
          set -e

          echo "Detecting changes in this push..."

          # Get changed files between last commit and current commit
          git diff --name-status HEAD^ HEAD > changed_files.txt

          echo "===== CHANGED FILES ====="
          cat changed_files.txt || true

          # Extract only Java files
          ADDED_OR_MODIFIED=$(awk '$1 != "D" && $2 ~ /\.java$/ {print $2}' changed_files.txt)
          DELETED=$(awk '$1 == "D" && $2 ~ /\.java$/ {print $2}' changed_files.txt)

          echo "ADDED_OR_MODIFIED=$ADDED_OR_MODIFIED"
          echo "DELETED=$DELETED"

          # Save for next steps
          echo "ADDED_OR_MODIFIED<<EOF" >> $GITHUB_ENV
          echo "$ADDED_OR_MODIFIED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "DELETED<<EOF" >> $GITHUB_ENV
          echo "$DELETED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      - name: Run AI Review on Changed Java Files
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_MODEL: "gemini-flash-latest"
        run: |
          set -euo pipefail
          
          echo "{}" > ai_results.json
          
          process_file () {
            FILE=$1
          
            echo "Reviewing $FILE"
          
            if [ ! -f "$FILE" ]; then
              echo "File deleted or missing: $FILE"
              return
            fi
          
            FILE_CONTENT=$(cat "$FILE")
          
            PAYLOAD=$(jq -n \
              --arg file "$FILE" \
              --arg content "$FILE_CONTENT" \
              '{
                contents: [
                  {
                    parts: [
                      {
                        text: (
                          "You are an encouraging but strict Senior Java Developer reviewing a fresher'\''s daily code changes. " +
                          "Analyze this Git diff and generate a clean, brief, bulleted report. Follow these rules:\n" +
                          "1. If the code is well-written and has no notable errors, output a brief, highly appreciative and encouraging message praising their clean work.\n" +
                          "2. If errors exist, skip the praise and list the critical flaws under these specific headers:\n" +
                          "[CRITICAL LOGIC BUGS] (resource leaks, broken loops, bad logic)\n" +
                          "[NAMING & STYLE CONVENTIONS] (violations of camelCase, PascalCase, or bad variable names like x, y, temp)\n" +
                          "[CLEAN CODE SUGGESTIONS] (redundant code, better ways to write it)\n\n" +
                          "return VALID JSON only.\n\n" +
                          "JSON FORMAT:\n" +
                          "{\n" +
                          "  \"status\": \"PASS|FAIL\",\n" +
                          "  \"files\": [\n" +
                          "    {\n" +
                          "      \"file\": \"FileName.java\",\n" +
                          "      \"criticalLogicBugs\": [],\n" +
                          "      \"namingStyleIssues\": [],\n" +
                          "      \"cleanCodeSuggestions\": []\n" +
                          "    }\n" +
                          "  ]\n" +
                          "}\n\n" +
                          "- If no issues: status = PASS, files = []\n" +
                          "- Keep each point under 15 words\n\n" +
                          "FILE:\n" + $content
                        )
                      }
                    ]
                  }
                ]
              }')
          
            RESPONSE=$(curl -s -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          
            echo "$RESPONSE" > "ai_${FILE//\//_}.json"
          
            echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' \
              > "ai_${FILE//\//_}.txt" || true
          }
          
          # Process added/modified files
          for file in $ADDED_OR_MODIFIED; do
            process_file "$file"
          done
          
      - name: Manage GitHub Issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const actor = context.actor;
            
            let changed;
            try {
              changed = fs.readFileSync('changed_files.txt', 'utf8')
                .trim()
                .split('\n')
                .filter(Boolean);
            } catch (e) {
              console.log("No changed files found");
              return;
            }
            
            let aiData = {};
            
            // Load all AI outputs
            const files = fs.readdirSync('.');
            
            for (const f of files) {
              if (f.startsWith('ai_') && f.endsWith('.json')) {
                try {
                  const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                  const fileName = f.replace('ai_', '').replace('.json', '').replace(/_/g, '/');
                  aiData[fileName] = data;
                } catch (e) {}
              }
            }
            
            const extractStatus = (data) => {
              try {
                return data.candidates[0].content.parts[0].text.includes('"PASS"')
                  ? "PASS" : "FAIL";
              } catch {
                return "ERROR";
              }
            };
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            
            const findIssue = (file) =>
              issues.data.find(i =>
                i.title.includes(file)
              );
            
            for (const file of changed) {
            
              const isDeleted = file.startsWith("D ");
              const cleanFile = file.replace(/^A\s|^M\s|^D\s/, '').trim();
            
              const aiFile = aiData[cleanFile];
            
              // -----------------------------------
              // CASE 1: DELETED FILE
              // -----------------------------------
              if (file.startsWith("D")) {
                const existing = findIssue(cleanFile);
            
                if (existing) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: "closed"
                  });
            
                  console.log(`Closed issue for deleted file: ${cleanFile}`);
                }
                continue;
              }
            
              if (!aiFile) continue;
            
              const statusText = aiFile.candidates?.[0]?.content?.parts?.[0]?.text || "";
              const isPass = statusText.includes('"status": "PASS"');
            
              const issueTitle = `AI Review - ${actor} - ${cleanFile}`;
            
              const commentBody =
                `FILE: ${cleanFile}\n\n` +
                `LATEST AI REVIEW:\n\n` +
                statusText;
            
              const existing = findIssue(cleanFile);
            
              // -----------------------------------
              // CASE 2: PASS → CLOSE ISSUE
              // -----------------------------------
              if (isPass) {
                if (existing) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: "closed"
                  });
                }
                continue;
              }
            
              // -----------------------------------
              // CASE 3: FAIL → CREATE OR UPDATE ISSUE
              // -----------------------------------
              if (existing) {
            
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: commentBody
                });
            
                console.log(`Updated issue: ${cleanFile}`);
            
              } else {
            
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: commentBody,
                  assignees: [actor]
                });
            
                console.log(`Created issue: ${cleanFile}`);
              }
            }
            
      - name: Build Email Body
        run: |
            STATUS=$(grep -o '"status": *"[^"]*"' raw_ai.json | head -1 | cut -d'"' -f4)
            
            if [ "$STATUS" = "PASS" ]; then
            
              EMAIL=$(cat <<EOF
              Hello,
              
              A new commit push has been evaluated by the automated review system.
              
              Commiter Account: ${{ github.actor }}
              Branch: ${{ github.ref_name }}
              
              ✔ CODE REVIEW PASSED
              
              Great job! Clean and correct implementation.
              
              Please find the detailed code analysis attached as 'AI_REVIEW.txt'.
              
              You can view the raw code changes here:
              ${{ github.event.head_commit.url }}
              
              EOF
              )
              
              else
              
              EMAIL=$(cat <<EOF
              Hello,
              
              A new commit push has been evaluated by the automated review system.
              
              Commiter Account: ${{ github.actor }}
              Branch: ${{ github.ref_name }}
              
              ❌ CODE REVIEW COMPLETED
              
              Please find the detailed code analysis attached as 'AI_REVIEW.txt'.
              
              You can view the raw code changes here:
              ${{ github.event.head_commit.url }}
              
              -----------------------------------------
              ATTACHMENT: AI_REVIEW.txt
              -----------------------------------------

              $(cat AI_REVIEW.txt)
              EOF
              )
              
              fi
              
              {
                echo "EMAIL<<EOF"
                echo "$EMAIL"
                echo "EOF"
              } >> $GITHUB_ENV

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NMS Code Review] Commit Activity by ${{ github.actor }}"
          to: ${{ github.event.head_commit.author.email }}
          cc: sanjeev@nmsworks.co.in
          from: "NMS AI-Automated Reviewer"
          body: ${{ env.EMAIL }}
          attachments: AI_REVIEW.txt