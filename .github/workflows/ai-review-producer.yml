name: AI Review Producer

on:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  enqueue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Java Files (Robust Multi-Commit Safe)
        id: changes
        run: |
          set -euo pipefail

          echo "Detecting changes in this push..."

          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "First commit detected - listing all files in HEAD"
            git ls-tree -r --name-status HEAD > changed_files.txt
          else
            echo "Normal / multi-commit push detected"

            git fetch --no-tags --prune --depth=50 origin ${{ github.ref_name }} || true

            BASE_COMMIT=$(git merge-base "$BASE" "$HEAD")

            git diff --name-status "$BASE_COMMIT" "$HEAD" > changed_files.txt
          fi

          echo "===== CHANGED FILES ====="
          cat changed_files.txt || true

          ADDED_OR_MODIFIED=$(awk '$1 != "D" && $2 ~ /\.java$/ {print $2}' changed_files.txt)
          DELETED=$(awk '$1 == "D" && $2 ~ /\.java$/ {print $2}' changed_files.txt)

          echo "ADDED_OR_MODIFIED=$ADDED_OR_MODIFIED"
          echo "DELETED=$DELETED"

          HAS_JAVA_CHANGES="false"
          if [ -n "$ADDED_OR_MODIFIED" ] || [ -n "$DELETED" ]; then
            HAS_JAVA_CHANGES="true"
          fi

          {
            echo "ADDED_OR_MODIFIED<<EOF"
            printf "%s\n" "$ADDED_OR_MODIFIED"
            echo "EOF"

            echo "DELETED<<EOF"
            printf "%s\n" "$DELETED"
            echo "EOF"
          } >> "$GITHUB_ENV"  

          echo "has_java_changes=$HAS_JAVA_CHANGES" >> "$GITHUB_OUTPUT"

      - name: Find AI review queue issue (by label)
        if: steps.changes.outputs.has_java_changes == 'true'
        id: find_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "ai-review-queue"
              }
            );

            const queue = issues.find(i => i.title === "AI_REVIEW_QUEUE");

            if (!queue) {
              throw new Error("AI_REVIEW_QUEUE issue not found");
            }

            core.setOutput("issue_number", queue.number);

      - name: Enqueue review request
        if: steps.changes.outputs.has_java_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.find_issue.outputs.issue_number }}");

            const payload = {
              branch: context.ref.replace("refs/heads/", ""),
              commit: context.sha,
              githubUsername: context.actor,
              commitAuthor: context.payload.head_commit?.author?.name,
              commitEmail: context.payload.head_commit?.author?.email,
              commitMessage: context.payload.head_commit?.message,
              commitTimeIST: new Date(context.payload.head_commit?.timestamp)
                .toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }),
              addedOrModified: (process.env.ADDED_OR_MODIFIED || "")
                .split("\n")
                .filter(Boolean),
              deleted: (process.env.DELETED || "")
                .split("\n")
                .filter(Boolean)
            };

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: JSON.stringify(payload)
            });