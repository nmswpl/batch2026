name: Remove Eyes Reactions from Issue

on:
  workflow_dispatch:

jobs:
  remove-eyes-reactions:
    runs-on: ubuntu-latest
    steps:
      - name: Remove eyes reactions from all comments
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = 21;

            console.log(`Fetching comments for issue #${issueNumber}...`);

            // Get all comments on the issue
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            console.log(`Found ${comments.length} comments`);

            if (comments.length === 0) {
              console.log('No comments found');
              return;
            }

            let removedCount = 0;

            // Remove eyes reaction from each comment
            for (const comment of comments) {
              try {
                await github.rest.reactions.deleteForIssueComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                  reaction_type: 'eyes'
                });
                console.log(`✓ Removed eyes reaction from comment #${comment.id}`);
                removedCount++;
              } catch (error) {
                // Reaction might not exist on this comment, which is fine
                if (error.status === 404) {
                  console.log(`- Comment #${comment.id} had no eyes reaction`);
                } else {
                  console.log(`✗ Error removing reaction from comment #${comment.id}: ${error.message}`);
                }
              }
            }

            console.log(`\nCompleted: Removed eyes reaction from ${removedCount}/${comments.length} comments`);
