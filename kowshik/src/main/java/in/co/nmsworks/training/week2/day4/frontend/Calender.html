<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calender</title>
</head>
<body>
    <div style="border: 1px solid black; border-radius: 5px">
        <div style="display: flex; height: 50px; background-color: red;">
            <h1 style="font-size: xx-large; color: white; margin: 10px">
                Calender
            </h1>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 5px">
            <h4 style="color: red;">Sunday</h4>
            <h4>Monday</h4>
            <h4>Tuesday</h4>
            <h4>Wednesday</h4>
            <h4>Thursday</h4>
            <h4>Friday</h4>
            <h4 style="color: red;">Saturday</h4>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 5px; border: 1px solid black; border-bottom: none">
            <h4 style="border: gray 1px solid; "></h4>
            <h4></h4>
            <h4>1</h4>
            <h4>2</h4>
            <h4>3</h4>
            <h4>4</h4>
            <h4 style="color: red;">5</h4>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 5px; border: 1px solid black; border-bottom: none">
            <h4 style="color: red;">6</h4>
            <h4>7</h4>
            <h4>8</h4>
            <h4>9</h4>
            <h4>10</h4>
            <h4>11</h4>
            <h4 style="color: red;">12</h4>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 5px; border: 1px solid black; border-bottom: none">
            <h4 style="color: red;">13</h4>
            <h4>14</h4>
            <h4>15</h4>
            <h4>16</h4>
            <h4>17</h4>
            <h4>18</h4>
            <h4 style="color: red;">19</h4>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 5px; border: 1px solid black; border-bottom: none">
            <h4 style="color: red;">20</h4>
            <h4>21</h4>
            <h4>22</h4>
            <h4>23</h4>
            <h4>24</h4>
            <h4>25</h4>
            <h4 style="color: red;">26</h4>
        </div>

        <div style="display: flex; justify-content: space-between; padding: 5px; border: 1px solid black; border-bottom: none">
            <h4 style="color: red;">27</h4>
            <h4>28</h4>
            <h4>29</h4>
            <h4>30</h4>
            <h4>31</h4>
            <h4></h4>
            <h4></h4>
        </div>
    </div>
</body>
</html>
