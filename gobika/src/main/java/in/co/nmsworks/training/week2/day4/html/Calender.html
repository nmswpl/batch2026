<html>
<head>
    <title>Calender</title>
    <style>
        .row{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            color: black;
            font-size: 20px;
            border: 1px red solid;
            border-radius: 5px;

        }
        .row1{
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-size: 20px;
            border: 1px red solid;
            border-radius: 5px;

        }
        .cell{
            align-content: center;
            margin-left: 20px;
            font-size: 40px;
            font-weight: bold;
            height: 10vh;
            width: 20vw;
            border-right: 1px solid red;

        }

        .weekend{
            align-content: center;
            margin-left: 10px;
            font-size: 40px;
            font-weight: bold;
            height: 10vh;
            width: 20vw;
            border-right: 1px solid red;
            color: red;
        }
    </style>
</head>
<body>
<div style="height: 80vh;width: 70vw;border-radius: 20%;margin-left: 20vw">
    <div style="background-color: red; height: 10vh;font-weight: bold;font-size: 50px; border-radius: 10px; color: white;align-items: center;border: red solid 1px" >
        Calender
    </div>
    <div class="row1">
        <div class="weekend">Sunday</div>
        <div class="cell">Monday</div>
        <div class="cell">Tuesday</div>
        <div class="cell">Wednesday</div>
        <div class="cell">Thursday</div>
        <div class="cell">Friday</div>
        <div class="weekend">Saturday</div>
    </div>
    <div class="row">
        <div class="weekend"></div>
        <div class="cell"></div>
        <div class="cell">1</div>
        <div class="cell">2</div>
        <div class="cell">3</div>
        <div class="cell">4</div>
        <div class="weekend">5</div>
    </div>
    <div class="row">
        <div class="weekend">6</div>
        <div class="cell">7</div>
        <div class="cell">8</div>
        <div class="cell">9</div>
        <div class="cell">10</div>
        <div class="cell">11</div>
        <div class="weekend">12</div>
    </div>
    <div class="row">
        <div class="weekend">13</div>
        <div class="cell">14</div>
        <div class="cell">15</div>
        <div class="cell">16</div>
        <div class="cell">17</div>
        <div class="cell">18</div>
        <div class="weekend">19</div>
    </div>
    <div class="row">
        <div class="weekend">20</div>
        <div class="cell">21</div>
        <div class="cell">22</div>
        <div class="cell">23</div>
        <div class="cell">24</div>
        <div class="cell">25</div>
        <div class="weekend">26</div>
    </div>
    <div class="row">
        <div class="weekend">27</div>
        <div class="cell">28</div>
        <div class="cell">29</div>
        <div class="cell">30</div>
        <div class="cell">31</div>
        <div class="cell"></div>
        <div class="weekend"></div>
    </div>
</div>
</body>
</html>
