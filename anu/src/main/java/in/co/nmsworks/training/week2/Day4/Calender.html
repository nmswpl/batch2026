<html>
<head>
    <title>Display the calender</title>
    <style>

        .calender{
            display: flex;
            background-color: red;
            justify-content: center;
            border:2px solid;
            padding:20px;
            width: 700px;
            font-size: x-large;
            color: white;
        }
        .calenderDate{
            display:flex;
            background-color: white;
            border:2px solid;
            padding:20px;
            width: 700px;
            justify-content: space-evenly;
        }
        .Day{
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            width: 100%;
            font-size: x-large;
        }

        .date{
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            border-right: groove;
            width: 100%;
            color:black;
            font-size: x-large;
        }
        .date:last-child{
            border-right: none;
        }
    </style>
</head>
<body>
<div>
    <div style ="display:flex; border: 2px  ">
        <div class =calender>
            Calender
        </div>
    </div>
    <div class=calenderDate>
        <div class=Day >

            <div>Monday</div>
            <div>Tuesday</div>
            <div>Wednesday</div>
            <div>Thursday</div>
            <div>Friday</div>
            <div style="color: red">Saturday</div>
        </div>
    </div>
    <div class="calenderDate">
        <div class="date">
            <div class="date"></div>
            <div class="date"></div>
            <div class="date">1</div>
            <div class="date">2</div>
            <div class="date">3</div>
            <div class="date">4</div>
            <div class="date" style="color: red">5 </div>
        </div>
    </div>
    <div class="calenderDate">
        <div class="date">

            <div class="date">7</div>
            <div class="date">8</div>
            <div class="date">9</div>
            <div class="date">10</div>
            <div class="date">11</div>
            <div class="date" style="color: red">12</div>
        </div>
    </div>
    <div class="calenderDate">
        <div class="date">
            <div class="date" style="color: red">13</div>
            <div class="date">14</div>
            <div class="date">15</div>
            <div class="date">16</div>
            <div class="date">17</div>
            <div class="date">18</div>
            <div class="date" style="color: red">19</div>

    </div>
    <div class="calenderDate">

        </div>
    </div>
    <div class="calenderDate">
        <div class="date">
            <div class="date" style="color: red">27</div>
            <div class="date">28</div>
            <div class="date">29</div>
            <div class="date">30</div>

            <div class="date"></div>
        </div>
    </div>
</div>
</body>
</html>
