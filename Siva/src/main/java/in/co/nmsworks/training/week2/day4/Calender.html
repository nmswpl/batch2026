<html xmlns="http://www.w3.org/1999/html">
<head>
    <title>Calender</title>
    <link rel = "stylesheet" href="Calender.css">
</head>

<body>
    <div class="TotalScreen">
        <div class="CalenderDiv">
            <div class="CalenderTop">
                <div>Calendar</div>
            </div>
            <div class="CalenderBottom">
                <div class="DaysDiv">
                    <div class="EachDay" style="color: red">Sun</div>
                    <div class="EachDay">Mon</div>
                    <div class="EachDay">Tue</div>
                    <div class="EachDay">Wed</div>
                    <div class="EachDay">Thr</div>
                    <div class="EachDay">Fri</div>
                    <div  class="EachDay"style="color: red">Sat</div>
                </div>
                <div class="Dates">
                    <div class="EachDateDiv"  style="color: grey">29</div>
                    <div class="EachDateDiv" style="color: grey">30</div>
                    <div class="EachDateDiv">1</div>
                    <div class="EachDateDiv">2</div>
                    <div class="EachDateDiv">3</div>
                    <div class="EachDateDiv">4</div>
                    <div class="EachDateDiv" style="color: red">5</div>
                </div>
                <div class="Dates">
                    <div class="EachDateDiv" style="color: red">6</div>
                    <div class="EachDateDiv">7</div>
                    <div class="EachDateDiv">8</div>
                    <div class="EachDateDiv">9</div>
                    <div class="EachDateDiv">10</div>
                    <div class="EachDateDiv">11</div>
                    <div class="EachDateDiv" style="color: red">12</div>
                </div>
                <div class="Dates">
                    <div class="EachDateDiv" style="color: red">13</div>
                    <div class="EachDateDiv">14</div>
                    <div class="EachDateDiv">15</div>
                    <div class="EachDateDiv">16</div>
                    <div class="EachDateDiv">17</div>
                    <div class="EachDateDiv">18</div>
                    <div class="EachDateDiv" style="color: red">19</div>
                </div>
                <div class="Dates">
                    <div class="EachDateDiv" style="color: red">20</div>
                    <div class="EachDateDiv">21</div>
                    <div class="EachDateDiv">22</div>
                    <div class="EachDateDiv">23</div>
                    <div class="EachDateDiv">24</div>
                    <div class="EachDateDiv">25</div>
                    <div class="EachDateDiv" style="color: red">26</div>
                </div>
                <div class="Dates">
                    <div class="EachDateDiv" style="color: red">27</div>
                    <div class="EachDateDiv">28</div>
                    <div class="EachDateDiv">29</div>
                    <div class="EachDateDiv">30</div>
                    <div class="EachDateDiv">31</div>
                    <div class="EachDateDiv" style="color: grey">1</div>
                    <div class="EachDateDiv" style="color: grey">2</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
