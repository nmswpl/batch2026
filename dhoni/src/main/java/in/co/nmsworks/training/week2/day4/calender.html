<html>
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div>

    </div>

        <div class="box-heading">

            <div>9</div>

            <div>12</div>

            <div>14</div>
            <div>15</div>
            <div>16</div>
            <div>17</div>
            <div>18</div>

        </div>

        <div class="box" >

            <div>21</div>
            <div>22</div>
            <div>23</div>
            <div>24</div>
            <div>25</div>

        </div>

        <div class="box" >

            <div>31</div>
            <div>-</div>
            <div>-</div>
        </div>

    <div/>
</body>
</html>
