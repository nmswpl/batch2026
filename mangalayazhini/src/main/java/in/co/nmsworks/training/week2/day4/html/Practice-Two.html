<html>
<head>
    <title>Calender</title>
    <style>
        body{
           font-family: Verdana, sans-serif;
        }

        .calendar-div{
            /*border : 2px solid grey;*/
            display : flex;
            flex-direction: column;
            align-items: center;

        }
        .day-names-div{
            display : flex;
            /*border : 1px solid grey;*/
            /*justify-content: space-between;*/
        }

        .date-box{
            border: 1px solid grey;
            padding : 5px;
            width : 95px;
            text-align: center;
        }

        .date-div{
            display : flex;

            /*justify-content: space-between;*/
        }

        .day-box{
            border: 1px solid grey ;
            width : 95px;
            text-align: center;
            padding:5px;
        }

        .title-box{
            background-color: #d73737;
            font-size: x-large;
            text-align: center;
            padding : 10px;
            color : #eff2f4;
            margin-bottom:3px;


        }

        .holidays{
            color: #d73737;
        }
    </style>
</head>
    <body>

        <div class="calendar-div">

            <div>
                <div class="title-box">Calendar</div>

                <div class="day-names-div">
                    <div class="day-box holidays">Sunday</div>
                    <div class="day-box">Monday</div>
                    <div class="day-box">Tuesday</div>
                    <div class="day-box">Wednesday</div>
                    <div class="day-box">Thursday</div>
                    <div class="day-box">Friday</div>
                    <div class="day-box holidays">Saturday</div>
                </div>

                <div class="date-div">
                    <div class="date-box holidays"></div>
                    <div class="date-box"></div>
                    <div class="date-box">1</div>
                    <div class="date-box">2</div>
                    <div class="date-box">3</div>
                    <div class="date-box">4</div>
                    <div class="date-box holidays">5</div>
                </div>

                <div class="date-div">
                    <div class="date-box holidays">6</div>
                    <div class="date-box">7</div>
                    <div class="date-box">8</div>
                    <div class="date-box">9</div>
                    <div class="date-box">10</div>
                    <div class="date-box">11</div>
                    <div class="date-box holidays">12</div>
                </div>

                <div class="date-div ">
                    <div class="date-box holidays">13</div>
                    <div class="date-box">14</div>
                    <div class="date-box">15</div>
                    <div class="date-box">16</div>
                    <div class="date-box">17</div>
                    <div class="date-box">18</div>
                    <div class="date-box holidays">19</div>
                </div>

                <div class="date-div">
                    <div class="date-box holidays">20</div>
                    <div class="date-box">21</div>
                    <div class="date-box">22</div>
                    <div class="date-box">23</div>
                    <div class="date-box">24</div>
                    <div class="date-box">25</div>
                    <div class="date-box holidays">26</div>
                </div>

                <div class="date-div">
                    <div class="date-box holidays">27</div>
                    <div class="date-box">28</div>
                    <div class="date-box">29</div>
                    <div class="date-box">30</div>
                    <div class="date-box">31</div>
                    <div class="date-box"></div>
                    <div class="date-box holidays"></div>
                </div>

            </div>
        </div>
    </body>
</html>
